<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 30px;
        }

        .container {
            width: 600px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
        }

        input, textarea, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }

        .task {
            background: #eef2ff;
            padding: 15px;
            margin-top: 10px;
            border-radius: 8px;
        }

        .delete {
            background: #dc2626;
        }

        .complete {
            background: #16a34a;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>To-Do Task Manager</h2>

    <input type="text" id="title" placeholder="Task title">
    <textarea id="description" placeholder="Task description"></textarea>
    <button onclick="addTask()">Add Task</button>

    <h3>My Tasks</h3>
    <div id="taskList"></div>
</div>

<script>
    const API_URL = "http://localhost:5000/api/tasks";

    async function getTasks() {
        const response = await fetch(API_URL);
        const tasks = await response.json();

        const taskList = document.getElementById("taskList");
        taskList.innerHTML = "";

        tasks.forEach(task => {
            taskList.innerHTML += `
                <div class="task">
                    <h3>${task.title}</h3>
                    <p>${task.description}</p>
                    <p>Status: ${task.completed ? "Completed" : "Pending"}</p>

                    <button class="complete" onclick="markCompleted(${task.id}, '${task.title}', '${task.description}')">
                        Mark Completed
                    </button>

                    <button class="delete" onclick="deleteTask(${task.id})">
                        Delete
                    </button>
                </div>
            `;
        });
    }

    async function addTask() {
        const title = document.getElementById("title").value;
        const description = document.getElementById("description").value;

        await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: title,
                description: description,
                completed: false
            })
        });

        document.getElementById("title").value = "";
        document.getElementById("description").value = "";

        getTasks();
    }

    async function markCompleted(id, title, description) {
        await fetch(`${API_URL}/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: title,
                description: description,
                completed: true
            })
        });

        getTasks();
    }
    async function deleteTask(id) {
        await fetch(`${API_URL}/${id}`, {
            method: "DELETE"
        });

        getTasks();
    }

    getTasks();
</script>

</body>
</html>
